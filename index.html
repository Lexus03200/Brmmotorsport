<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRMOTORSPORT - Performance Automobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        html { overflow-y: scroll; overflow-x: hidden; }
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Montserrat:wght@700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; background-color: black; }
        h1, h2, h3 { font-family: 'Montserrat', sans-serif; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        /* Animations */
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes bounceIn { 0%, 20%, 40%, 60%, 80%, 100% { transition-timing-function: cubic-bezier(0.215, 0.610, 0.355, 1.000); } 0% { opacity: 0; transform: scale3d(.3, .3, .3); } 20% { transform: scale3d(1.1, 1.1, 1.1); } 40% { transform: scale3d(.9, .9, .9); } 60% { opacity: 1; transform: scale3d(1.03, 1.03, 1.03); } 80% { transform: scale3d(.97, .97, .97); } 100% { opacity: 1; transform: scale3d(1, 1, 1); } }
        @keyframes blob { 0% { transform: translate(0px, 0px) scale(1); } 33% { transform: translate(30px, -50px) scale(1.1); } 66% { transform: translate(-20px, 20px) scale(0.9); } 100% { transform: translate(0px, 0px) scale(1); } }
        @keyframes scrollText { 0% { transform: translateX(0%); } 100% { transform: translateX(-100%); } }
        @keyframes slideInFromLeft { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes vibrate { 0% { transform: translate(0px, 0px); } 25% { transform: translate(-0.5px, 0.5px); } 50% { transform: translate(0.5px, -0.5px); } 75% { transform: translate(-0.5px, -0.5px); } 100% { transform: translate(0px, 0px); } }
        
        .animate-fade-in-down { animation: fadeInDown 0.8s ease-out forwards; }
        .animate-fade-in-up { animation: fadeInUp 0.8s ease-out forwards; }
        .animate-fade-in { animation: fadeIn 0.8s ease-out forwards; }
        .animate-bounce-in { animation: bounceIn 1s; }
        .animate-blob { animation: blob 7s infinite; }
        .animate-vibrate { animation: vibrate 0.15s ease-in-out infinite; }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }
        .scrolling-banner-text { display: inline-block; white-space: nowrap; animation: scrollText 30s linear infinite; }
        .scrolling-banner-container { overflow: hidden; }
        .animate-slide-in-left { animation: slideInFromLeft 1s ease-out forwards; }
        .delay-animation { animation-delay: var(--delay-factor); }
        
        /* Lightbox & Utils */
        .lightbox-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0, 0, 0, 0.8); display: flex; justify-content: center; align-items: center; z-index: 100; animation: fadeIn 0.3s ease-out forwards; }
        .lightbox-content { position: relative; max-width: 90%; max-height: 90%; display: flex; justify-content: center; align-items: center; }
        .lightbox-image { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 0.75rem; }
        .lightbox-button { background-color: rgba(0, 0, 0, 0.5); color: white; padding: 0.75rem; border-radius: 9999px; display: flex; align-items: center; justify-content: center; transition: background-color 0.2s ease-in-out; cursor: pointer; position: absolute; z-index: 101; }
        .lightbox-button:hover { background-color: rgba(0, 0, 0, 0.8); }
        .lightbox-close-button { top: 1rem; right: 1rem; }
        .lightbox-prev-button { left: 1rem; top: 50%; transform: translateY(-50%); }
        .lightbox-next-button { right: 1rem; top: 50%; transform: translateY(-50%); }
        
        .scroll-to-top { animation: fadeIn 0.5s ease-out forwards; }
        .scroll-to-top.hidden { animation: fadeOut 0.5s ease-out forwards; opacity: 0; pointer-events: none; }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        
        .navbar-hidden { transform: translateY(-100%); }
        .navbar-visible { transform: translateY(0); }
        .navbar-transition { transition: transform 0.3s ease-in-out; }
    </style>
</head>

        // --- ICONS (SVG) ---
        const CarIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 17H5c-1.1 0-2 .9-2 2v2h18v-2c0-1.1-.9-2-2-2Z"/><path d="M7 17V5h12v12"/><path d="M18 10h-8"/><path d="M10 10v7"/></svg>);
        const HandshakeIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.23 20.73a4.7 4.7 0 0 0 6.64-6.64L12.23 7.07l-2.06 2.06"/><path d="M16 16l-3.23 3.23a4.7 4.7 0 0 1-6.64-6.64L9.07 7.07l2.06 2.06"/><path d="M14 10l-2.06 2.06"/><path d="m10 14 2.06-2.06"/></svg>);
        const WrenchIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-3.77 3.77a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 0-8.49-8.49l-3.77 3.77a1 1 0 0 0 0 1.4l1.6 1.6z"/><path d="M5.5 12.5l-3-3L12.5 2.5l3 3z"/></svg>);
        const CalendarIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/></svg>);
        const UsersIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87L16 16"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>);
        const RssIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1"/></svg>);
        const PhoneIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-3.07-8.63A2 2 0 0 1 4.11 2H7c.43 0 .79.27.94.66.14.39.07.82-.2 1.1L5.05 6.05c-.35.35-.5.85-.34 1.34A19.79 19.79 0 0 0 16.92 19c.49.16.99.01 1.34-.34l2.29-2.29c.28-.27.71-.34 1.1-.2.39.14.66.5.66.94Z"/></svg>);
        const MailIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>);
        const MapPinIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 18s-4.5-8-4.5-11.5A4.5 4.5 0 0 1 12 2a4.5 4.5 0 0 1 4.5 4.5c0 3.5-4.5 11.5-4.5 11.5z"/><circle cx="12" cy="6.5" r="2.5"/></svg>);
        const InstagramIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.5" y1="6.5" y2="6.5"/></svg>);
        const PlayIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>);
        const PauseIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>);
        const StarIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>);
        const ArrowLeftIcon = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>);
        const ArrowRightIcon = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>);
        const XIcon = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>);
        const PlusIcon = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 5v14"/><path d="M5 12h14"/></svg>);
        const MinusIcon = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14"/></svg>);
        const TargetIcon = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>);
        const RotateCcwIcon = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.79 2.91L3 12H3z"/><path d="M3 3v.01"/></svg>);
        const ArrowUpIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 19V5"/><path d="m5 12 7-7 7 7"/></svg>);
        const FileIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>);

        // --- COMPONENTS & LOGIC ---
        const FloatingPhoneButton = () => (
            <a href="tel:+33668278801" className="fixed bottom-6 left-6 z-50 p-4 bg-green-600 text-white rounded-full shadow-lg hover:bg-green-500 transition-all hover:scale-110 flex items-center justify-center border-2 border-white" title="Nous appeler maintenant" style={{ boxShadow: "0 0 15px rgba(22, 163, 74, 0.7)" }}> <PhoneIcon /> </a>
        );

        const ContentContext = createContext();
        const setNestedProperty = (obj, path, value) => {
            const pathParts = path.split('.'); let current = obj;
            for (let i = 0; i < pathParts.length; i++) {
                const part = pathParts[i]; const isLastPart = (i === pathParts.length - 1); const isArrayIndex = !isNaN(parseInt(part)) && String(parseInt(part)) === part;
                if (isLastPart) { current[isArrayIndex ? parseInt(part) : part] = value; }
                else {
                    if (isArrayIndex) { if (!Array.isArray(current)) return obj; if (current[parseInt(part)] === undefined) current[parseInt(part)] = {}; current = current[parseInt(part)]; }
                    else { if (typeof current[part] !== 'object' || current[part] === null) current[part] = {}; current = current[part]; }
                }
            } return obj;
        };

        const EditableText = ({ tag: Tag, contentKey, isAdminAuthenticated, className }) => {
            const { content, updateContent } = useContext(ContentContext);
            const getValue = (obj, p) => { let current = obj; for (let i = 0; i < p.length; i++) { const part = p[i]; if (current && typeof current === 'object' && (Array.isArray(current) ? current[parseInt(part)] !== undefined : current.hasOwnProperty(part))) { current = Array.isArray(current) ? current[parseInt(part)] : current[part]; } else return `[Contenu manquant]`; } return current; };
            const textValue = content ? getValue(content, contentKey.split('.')) : `Chargement...`;
            const handleChange = (e) => updateContent(contentKey, e.target.value);
            if (isAdminAuthenticated) {
                if (Tag === 'h1' || Tag === 'h2') return <input type="text" value={typeof textValue === 'string' ? textValue : ''} onChange={handleChange} className={`${className} bg-gray-700 text-white rounded p-2 focus:ring-2 focus:ring-blue-500 w-full`} />;
                return <textarea value={typeof textValue === 'string' ? textValue : ''} onChange={handleChange} className={`${className} bg-gray-700 text-white rounded p-2 focus:ring-2 focus:ring-blue-500 w-full min-h-[50px]`} rows={3} />;
            }
            return <Tag className={className} dangerouslySetInnerHTML={{ __html: typeof textValue === 'string' ? textValue : '' }} />;
        };

        const ScrollingBanner = () => {
            const bannerText = "BRMOTORSPORT • VOTRE SATISFACTION EST NOTRE PRIORITÉ • ";
            return (
                <div className="w-full bg-red-700 text-white text-lg font-bold py-2 overflow-hidden whitespace-nowrap fixed top-0 left-0 z-50 shadow-md">
                    <div className="scrolling-banner-container">
                        <span className="scrolling-banner-text">{Array(10).fill(bannerText).join('')}</span>
                        <span className="scrolling-banner-text" aria-hidden="true">{Array(10).fill(bannerText).join('')}</span>
                    </div>
                </div>
            );
        };

        const PerformanceSelector = () => {
            const [brand, setBrand] = useState("Peugeot / Citroën / DS");
            const [model, setModel] = useState("2.0 HDi 136/140/150");
            const stats = carData[brand][model];
            return (
                <div className="max-w-4xl mx-auto bg-gray-900/80 border border-gray-800 p-8 rounded-3xl shadow-2xl backdrop-blur-md">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10 text-left">
                        <div className="space-y-2"><label className="text-xs uppercase font-bold text-gray-500 tracking-widest">1. Choisir le Groupe</label><select value={brand} onChange={(e) => { setBrand(e.target.value); setModel(Object.keys(carData[e.target.value])[0]); }} className="w-full bg-gray-800 text-white p-4 rounded-xl border border-gray-700 outline-none focus:border-blue-500 transition cursor-pointer font-bold">{Object.keys(carData).map(b => <option key={b} value={b}>{b}</option>)}</select></div>
                        <div className="space-y-2"><label className="text-xs uppercase font-bold text-gray-500 tracking-widest">2. Motorisation</label><select value={model} onChange={(e) => setModel(e.target.value)} className="w-full bg-gray-800 text-white p-4 rounded-xl border border-gray-700 outline-none focus:border-blue-500 transition cursor-pointer font-bold">{Object.keys(carData[brand]).map(m => <option key={m} value={m}>{m}</option>)}</select></div>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 border-t border-gray-800 pt-8">
                        <div className="bg-gray-800/50 p-6 rounded-2xl text-center border border-gray-700"><span className="block text-gray-400 text-xs font-bold mb-2 uppercase italic tracking-widest">Origine</span><span className="text-xl font-black text-white">{stats.orig}</span></div>

                                <div><label className="block text-gray-300 text-sm font-bold mb-2">Téléphone</label><input type="tel" name="phone" required placeholder="06..." className="w-full p-3 rounded-lg bg-gray-700 border border-gray-600 focus:ring-2 focus:ring-blue-500 outline-none text-white" /></div>
                            </div>

                            <div><label className="block text-gray-300 text-sm font-bold mb-2">Véhicule (Marque, Modèle, Année)</label><input type="text" name="vehicle" required placeholder="Peugeot 308 2.0 BlueHDi 2019" className="w-full p-3 rounded-lg bg-gray-700 border border-gray-600 focus:ring-2 focus:ring-blue-500 outline-none text-white" /></div>
                            <div>
                                <label className="block text-gray-300 text-sm font-bold mb-2">Fichier de cartographie</label>
                                <div className="relative group"><input type="file" name="upload" required className="w-full p-4 bg-gray-900 rounded-lg border-2 border-dashed border-gray-500 hover:border-blue-500 cursor-pointer transition-colors" /><p className="text-xs text-gray-400 mt-2">Formats: .bin, .ori, .zip, .rar</p></div>

        const BlogPage = ({ isAdminAuthenticated }) => {
            const { content } = useContext(ContentContext);
            const blogPosts = content?.blog?.posts || [];
            const [isLightboxOpen, setIsLightboxOpen] = useState(false);
            const [lightboxImages, setLightboxImages] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const openLightbox = (images, idx) => { setLightboxImages(images); setCurrentIndex(idx); setIsLightboxOpen(true); };

            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-950 to-emerald-950 text-white pt-40 pb-12 font-inter">
                    <div className="container mx-auto px-6">
                        <EditableText tag="h1" contentKey="blog.mainTitle" isAdminAuthenticated={isAdminAuthenticated} className="text-4xl sm:text-5xl font-extrabold text-center mb-12 text-green-400 animate-fade-in-down animate-vibrate" />
                        <EditableText tag="p" contentKey="blog.description" isAdminAuthenticated={isAdminAuthenticated} className="text-xl text-center text-gray-300 max-w-3xl mx-auto mb-10 animate-fade-in-up" />
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                            {blogPosts.length > 0 ? blogPosts.map((post, i) => (
                                <div key={post.id || i} className="bg-gray-800 rounded-xl shadow-lg overflow-hidden transform transition hover:scale-105 hover:shadow-2xl border border-gray-700 hover:border-green-400 animate-fade-in-up delay-animation" style={{'--delay-factor': `${i*150}ms`}}>
                                    <div className="relative w-full h-64 overflow-hidden cursor-pointer" onClick={() => post.images && openLightbox(post.images, 0)}>
                                        <img src={post.images?.[0] || "https://placehold.co/600x400/000/FFF"} alt={post.title} className="w-full h-full object-cover" />
                                    </div>
                                    <div className="p-6">
                                        <h3 className="text-xl font-bold mb-3 text-white">{post.title}</h3>
                                        <p className="text-gray-300 mb-4">{post.description}</p>
                                    </div>
                                </div>
                            )) : <p className="text-center text-gray-400 col-span-3">Aucun article.</p>}
                        </div>
                    </div>
                    {isLightboxOpen && <Lightbox images={lightboxImages} currentIndex={currentIndex} onClose={() => setIsLightboxOpen(false)} onNavigate={setCurrentIndex} />}
                </div>
            );
        };

        const Lightbox = ({ images, currentIndex, onClose, onNavigate }) => {
            useEffect(() => {
                const hk = (e) => { if (e.key === 'Escape') onClose(); else if (e.key === 'ArrowLeft') onNavigate(currentIndex === 0 ? images.length-1 : currentIndex-1); else if (e.key === 'ArrowRight') onNavigate((currentIndex+1)%images.length); };
                window.addEventListener('keydown', hk); return () => window.removeEventListener('keydown', hk);
            }, [currentIndex, images.length]);
            return (
                <div className="lightbox-overlay" onClick={onClose}>
                    <div className="lightbox-content" onClick={e => e.stopPropagation()}>
                        <button className="lightbox-close-button lightbox-button" onClick={onClose}><XIcon /></button>
                        {images.length > 1 && <><button className="lightbox-button lightbox-prev-button" onClick={() => onNavigate(currentIndex === 0 ? images.length-1 : currentIndex-1)}><ArrowLeftIcon /></button><button className="lightbox-button lightbox-next-button" onClick={() => onNavigate((currentIndex+1)%images.length)}><ArrowRightIcon /></button></>}
                        <img src={images[currentIndex]} className="lightbox-image" />
                    </div>
                </div>
            );
        };

        const ShowcaseCarPage = ({ isAdminAuthenticated }) => {

            const [idx, setIdx] = useState(0);

                <div className="min-h-screen bg-gradient-to-br from-blue-950 to-emerald-950 text-white pt-40 pb-12 font-inter">

                        <EditableText tag="h1" contentKey="showcaseCar.mainTitle" isAdminAuthenticated={isAdminAuthenticated} className="text-4xl sm:text-5xl font-extrabold text-center mb-12 text-yellow-400 animate-fade-in-down animate-vibrate" />
                        <div className="bg-gray-800 p-8 rounded-2xl shadow-xl border border-gray-700 animate-fade-in-up space-y-8">
                            <div className="relative w-full h-96 md:h-[500px] overflow-hidden rounded-lg shadow-2xl border-4 border-red-700 flex items-center justify-center">
                                <img src={images[idx]} className="w-full h-full object-contain" onError={e => e.target.src="https://placehold.co/800x500/FF0000/FFFFFF?text=Image+Manquante"} />

                            </div>
                            <EditableText tag="h2" contentKey="showcaseCar.preparationTitle" isAdminAuthenticated={isAdminAuthenticated} className="text-2xl font-bold mb-4 text-white" />
                            <EditableText tag="p" contentKey="showcaseCar.preparationDescription" isAdminAuthenticated={isAdminAuthenticated} className="text-lg text-gray-300" />
                        </div>
                    </div>
                </div>
            );
        };

        const AboutUsPage = ({ isAdminAuthenticated }) => (
            <div className="min-h-screen bg-gradient-to-br from-blue-950 to-emerald-950 text-white pt-40 pb-12 font-inter">
                <div className="container mx-auto px-6 max-w-4xl">
                    <EditableText tag="h1" contentKey="aboutUs.mainTitle" isAdminAuthenticated={isAdminAuthenticated} className="text-4xl sm:text-5xl font-extrabold text-center mb-12 text-yellow-400 animate-fade-in-down animate-vibrate" />
                    <EditableText tag="p" contentKey="aboutUs.description" isAdminAuthenticated={isAdminAuthenticated} className="text-xl text-center text-gray-300 max-w-3xl mx-auto mb-10 animate-fade-in-up" />
                    <section className="bg-gray-800 p-8 rounded-2xl shadow-xl border border-gray-700 mb-12 animate-fade-in-up">
                        <EditableText tag="h2" contentKey="aboutUs.historyTitle" isAdminAuthenticated={isAdminAuthenticated} className="text-3xl font-bold mb-6 text-yellow-300 text-center" />
                        <EditableText tag="p" contentKey="aboutUs.historyParagraph1" isAdminAuthenticated={isAdminAuthenticated} className="text-lg text-gray-300 leading-relaxed mb-6" />
                    </section>
                </div>
            </div>
        );

        const ContactPage = ({ isAdminAuthenticated }) => {
            const { content } = useContext(ContentContext);
            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-950 to-emerald-950 text-white pt-40 pb-12 font-inter">
                    <div className="container mx-auto px-6 max-w-2xl">
                        <EditableText tag="h1" contentKey="contact.mainTitle" isAdminAuthenticated={isAdminAuthenticated} className="text-4xl sm:text-5xl font-extrabold text-center mb-12 text-pink-400 animate-fade-in-down animate-vibrate" />
                        <div className="bg-gray-800 p-8 rounded-2xl shadow-xl border border-gray-700 animate-fade-in-up space-y-8 text-center">
                            <div><MailIcon className="text-pink-500 w-12 h-12 mb-4 mx-auto" /><a href={`mailto:${content?.contact?.email}`} className="text-blue-400 hover:underline text-lg"><EditableText tag="span" contentKey="contact.email" isAdminAuthenticated={isAdminAuthenticated} /></a></div>
                            <div><PhoneIcon className="text-pink-500 w-12 h-12 mb-4 mx-auto" /><a href={`tel:${content?.contact?.phoneNumber}`} className="text-blue-400 hover:underline text-lg"><EditableText tag="span" contentKey="contact.phoneNumber" isAdminAuthenticated={isAdminAuthenticated} /></a></div>
                            <div><MapPinIcon className="text-pink-500 w-12 h-12 mb-4 mx-auto" /><EditableText tag="span" contentKey="contact.address" isAdminAuthenticated={isAdminAuthenticated} className="text-lg text-gray-300 whitespace-pre-line" /></div>

        const AdminLoginPage = ({ setIsAdminAuthenticated, setCurrentPage }) => {
            const [password, setPassword] = useState('');
            const handleSubmit = (e) => { e.preventDefault(); if (password === 'Remy03200!') { setIsAdminAuthenticated(true); localStorage.setItem('isAdminAuthenticated', 'true'); setCurrentPage('admin-panel'); } else alert('Mot de passe incorrect.'); };
            return (
                <div className="min-h-screen bg-gradient-to-br from-gray-900 to-black text-white pt-40 pb-12 font-inter flex items-center justify-center">
                    <div className="bg-gray-800 p-8 rounded-2xl shadow-xl border border-gray-700 w-full max-w-md animate-fade-in-up">
                        <h1 className="text-3xl font-extrabold text-center mb-4 text-orange-400">Accès Administrateur</h1>
                        <form onSubmit={handleSubmit} className="space-y-6">
                            <div><label className="block text-gray-300 text-sm font-bold mb-2">Mot de passe</label><input type="password" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full p-3 rounded bg-gray-700 text-white border border-gray-600" /></div>
                            <button type="submit" className="w-full bg-orange-600 hover:bg-orange-700 text-white font-bold py-3 px-4 rounded-lg">Se connecter</button>
                        </form>
                    </div>
                </div>
            );
        };

        const AdminPanelPage = ({ setIsAdminAuthenticated, setCurrentPage }) => {
            const handleLogout = () => { setIsAdminAuthenticated(false); localStorage.removeItem('isAdminAuthenticated'); setCurrentPage('accueil'); };
            return (
                <div className="min-h-screen bg-gray-900 text-white pt-40 pb-12 font-inter text-center">
                    <h1 className="text-4xl font-extrabold mb-12 text-orange-400">Panneau d'Administration</h1>
                    <p className="mb-8 text-gray-300">Modifiez les textes directement sur les pages du site.</p>
                    <button onClick={handleLogout} className="bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-6 rounded-lg">Déconnexion</button>
                </div>
            );
        };

        const MusicControl = ({ volume }) => {
            const audioRef = useRef(null); const [isPlaying, setIsPlaying] = useState(false);
            useEffect(() => { const a = document.getElementById('background-music'); if (a) { audioRef.current = a; a.volume = volume; a.play().then(() => setIsPlaying(true)).catch(() => setIsPlaying(false)); } }, [volume]);
            const toggle = () => { if (isPlaying) { audioRef.current.pause(); setIsPlaying(false); } else { audioRef.current.play(); setIsPlaying(true); } };
            return <button onClick={toggle} className="fixed bottom-8 right-8 bg-red-600 hover:bg-red-700 text-white p-4 rounded-full shadow-lg z-50 w-14 h-14 flex items-center justify-center">{isPlaying ? <PauseIcon /> : <PlayIcon />}</button>;
        };

        const ScrollToTopButton = () => {
            const [v, setV] = useState(false);
            useEffect(() => { const t = () => setV(window.pageYOffset > 300); window.addEventListener('scroll', t); return () => window.removeEventListener('scroll', t); }, []);
            return <button onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })} className={`fixed bottom-24 right-8 bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-full shadow-lg z-50 w-14 h-14 flex items-center justify-center ${v ? 'opacity-100' : 'opacity-0 pointer-events-none'} transition-opacity`}><ArrowUpIcon /></button>;
        };

        const App = () => {
            const [isAdminAuthenticated, setIsAdminAuthenticated] = useState(localStorage.getItem('isAdminAuthenticated') === 'true');
            const [currentPage, setCurrentPage] = useState('accueil');
            const [isNavbarVisible, setIsNavbarVisible] = useState(true);
            const lastScrollY = useRef(0);
            const [content, setContent] = useState({
                home: { mainTitle: "Libérez la <span class='text-red-500'>Puissance</span>", description: "Spécialiste de la reprogrammation moteur.", contactMessage: "Contactez-nous !", teamTitle: "Notre Équipe", teamDescription: "Professionnels passionnés." },
                blog: { mainTitle: "Notre Blog", description: "Nos dernières réalisations.", posts: [] },
                aboutUs: { mainTitle: "Qui sommes-nous ?", description: "BRMOTORSPORT est votre partenaire de confiance." },
                contact: { mainTitle: "Contactez-nous", email: "contact@brmotorsport.com", phoneNumber: "06.12.34.56.78", address: "Zone ind. le coquet" },
                showcaseCar: { mainTitle: "Voiture Vitrine", preparationTitle: "Stage 3", preparationDescription: "500ch+" },
                siteSettings: { musicVolume: 0.05 }
            });

            useEffect(() => { fetch('content.json').then(res => res.json()).then(data => setContent(data)).catch(err => console.log("Chargement fallback")); }, []);
            const updateContent = (path, value) => { const n = JSON.parse(JSON.stringify(content)); setNestedProperty(n, path, value); setContent(n); };

            useEffect(() => {
                const h = () => { const y = window.scrollY; if (y === 0 || y < lastScrollY.current) setIsNavbarVisible(true); else if (y > lastScrollY.current && y > 200) setIsNavbarVisible(false); lastScrollY.current = y; };
                window.addEventListener('scroll', h); return () => window.removeEventListener('scroll', h);
            }, []);
            useEffect(() => { window.scrollTo(0, 0); }, [currentPage]);

            const renderPage = () => {
                switch (currentPage) {
                    case 'accueil': return <HomePage setCurrentPage={setCurrentPage} isAdminAuthenticated={isAdminAuthenticated} />;
                    case 'envoi-carto': return <FileUploadPage isAdminAuthenticated={isAdminAuthenticated} />;
                    case 'blog': return <BlogPage isAdminAuthenticated={isAdminAuthenticated} />;
                    case 'qui-sommes-nous': return <AboutUsPage isAdminAuthenticated={isAdminAuthenticated} />;
                    case 'contact': return <ContactPage isAdminAuthenticated={isAdminAuthenticated} />;
                    case 'voiture-vitrine': return <ShowcaseCarPage isAdminAuthenticated={isAdminAuthenticated} />;
                    case 'admin-login': return <AdminLoginPage setIsAdminAuthenticated={setIsAdminAuthenticated} setCurrentPage={setCurrentPage} />;
                    case 'admin-panel': return isAdminAuthenticated ? <AdminPanelPage setIsAdminAuthenticated={setIsAdminAuthenticated} setCurrentPage={setCurrentPage} /> : <AdminLoginPage setIsAdminAuthenticated={setIsAdminAuthenticated} setCurrentPage={setCurrentPage} />;
                    default: return <HomePage setCurrentPage={setCurrentPage} isAdminAuthenticated={isAdminAuthenticated} />;
                }
            };

            return (
                <ContentContext.Provider value={{ content, updateContent }}>
                    <div className="min-h-screen bg-black font-inter overflow-x-hidden">
                        <ScrollingBanner />
                        <Navbar setCurrentPage={setCurrentPage} isAdminAuthenticated={isAdminAuthenticated} handleLogout={() => {setIsAdminAuthenticated(false); localStorage.removeItem('isAdminAuthenticated'); setCurrentPage('accueil');}} isVisible={isNavbarVisible} />
                        <main>{renderPage()}</main>
                        <MusicControl volume={content?.siteSettings?.musicVolume || 0.05} />
                        <ScrollToTopButton />
                        <FloatingPhoneButton />
                        <footer className="bg-gray-900 bg-opacity-90 backdrop-blur-sm text-gray-400 py-6 text-center shadow-inner rounded-t-lg mt-12">
                            <div className="container mx-auto px-4"><p>© {new Date().getFullYear()} BRMOTORSPORT. Tous droits réservés.</p></div>
                        </footer>
                    </div>
                </ContentContext.Provider>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
